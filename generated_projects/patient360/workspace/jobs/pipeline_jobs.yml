# Patient360 - Workspace Job Definitions
# Separate job definitions for each pipeline layer

jobs:
  # Job 1: Source Ingestion Job
  patient360_ingest:
    name: "Patient360 - Source Ingestion"
    schedule:
      quartz_cron_expression: "0 0 2 * * ?"
      timezone_id: "Asia/Kolkata"
    tasks:
      - task_key: ingest
        notebook_task:
          notebook_path: /Workspace/patient360/workspace/notebooks/bronze/01_bronze_patient
          base_parameters: {catalog: sdlc_catalog, raw_schema: patient_360_raw}

  # Job 2: Bronze Pipeline
  patient360_bronze:
    name: "Patient360 - Bronze Pipeline"
    tasks:
      - task_key: bronze_patient
        notebook_task:
          notebook_path: /Workspace/patient360/workspace/notebooks/bronze/01_bronze_patient
      - task_key: bronze_appointment
        notebook_task:
          notebook_path: /Workspace/patient360/workspace/notebooks/bronze/02_bronze_appointment
        depends_on: [{task_key: bronze_patient}]
      - task_key: bronze_diagnosis
        notebook_task:
          notebook_path: /Workspace/patient360/workspace/notebooks/bronze/03_bronze_diagnosis
        depends_on: [{task_key: bronze_appointment}]
      - task_key: bronze_medication
        notebook_task:
          notebook_path: /Workspace/patient360/workspace/notebooks/bronze/04_bronze_medication
        depends_on: [{task_key: bronze_diagnosis}]
      - task_key: bronze_lab
        notebook_task:
          notebook_path: /Workspace/patient360/workspace/notebooks/bronze/05_bronze_lab
        depends_on: [{task_key: bronze_medication}]
      - task_key: bronze_billing
        notebook_task:
          notebook_path: /Workspace/patient360/workspace/notebooks/bronze/06_bronze_billing
        depends_on: [{task_key: bronze_lab}]
      - task_key: bronze_history
        notebook_task:
          notebook_path: /Workspace/patient360/workspace/notebooks/bronze/07_bronze_patient_history
        depends_on: [{task_key: bronze_billing}]

  # Job 3: Silver Pipeline
  patient360_silver:
    name: "Patient360 - Silver Pipeline"
    tasks:
      - task_key: silver_patient
        notebook_task:
          notebook_path: /Workspace/patient360/workspace/notebooks/silver/01_silver_patient
      - task_key: silver_clinical
        notebook_task:
          notebook_path: /Workspace/patient360/workspace/notebooks/silver/02_silver_clinical
        depends_on: [{task_key: silver_patient}]
      - task_key: silver_financial
        notebook_task:
          notebook_path: /Workspace/patient360/workspace/notebooks/silver/03_silver_financial
        depends_on: [{task_key: silver_clinical}]

  # Job 4: Gold Pipeline
  patient360_gold:
    name: "Patient360 - Gold Pipeline"
    tasks:
      - task_key: gold_master
        notebook_task:
          notebook_path: /Workspace/patient360/workspace/notebooks/gold/01_gold_patient_master
      - task_key: gold_clinical_risk
        notebook_task:
          notebook_path: /Workspace/patient360/workspace/notebooks/gold/02_gold_clinical_and_risk
        depends_on: [{task_key: gold_master}]
      - task_key: gold_financial_perf
        notebook_task:
          notebook_path: /Workspace/patient360/workspace/notebooks/gold/03_gold_financial_and_performance
        depends_on: [{task_key: gold_master}]

  # Job 5: Dashboard Refresh
  patient360_dashboard_refresh:
    name: "Patient360 - Dashboard Refresh"
    tasks:
      - task_key: refresh_datasets
        notebook_task:
          notebook_path: /Workspace/patient360/src/gold/refresh_dashboard_datasets
          base_parameters: {catalog: sdlc_catalog, gold_schema: patient_360_gold}

  # Job 6: Validation Framework
  patient360_validation:
    name: "Patient360 - Validation Framework"
    tasks:
      - task_key: validate_pipeline
        notebook_task:
          notebook_path: /Workspace/patient360/workspace/notebooks/validation/validate_pipeline
          base_parameters: {catalog: sdlc_catalog}
