bundle:
  name: patient360

include:
  - resources/jobs.yml

variables:
  catalog_name:
    default: sdlc_catalog
  source_schema:
    default: patient_360
  raw_schema:
    default: patient_360_raw
  bronze_schema:
    default: patient_360_bronze
  silver_schema:
    default: patient_360_silver
  gold_schema:
    default: patient_360_gold
  cluster_id:
    default: ""
  notification_email:
    default: ""
    description: "Email address for job failure/success notifications — must not be empty"
  warehouse_id:
    default: ""
    description: "SQL Warehouse ID for AI/BI dashboard query execution"

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog_name: sdlc_catalog
      warehouse_id: 5e872471aabd37ad
      notification_email: jaswanthkadali@gmail.com
    workspace:
      host: https://dbc-b779df5b-df6a.cloud.databricks.com

  qa:
    mode: staging
    variables:
      catalog_name: sdlc_catalog
      warehouse_id: 5e872471aabd37ad
      notification_email: jaswanthkadali@gmail.com
    workspace:
      host: https://dbc-b779df5b-df6a.cloud.databricks.com

  prod:
    mode: production
    variables:
      catalog_name: sdlc_catalog
      warehouse_id: 5e872471aabd37ad
      notification_email: jaswanthkadali@gmail.com
    workspace:
      host: https://dbc-b779df5b-df6a.cloud.databricks.com

resources:
  dashboards:
    executive_dashboard:
      display_name: "Patient360 - Executive Dashboard [${bundle.target}]"
      file_path: ./dashboards/patient360_executive.lvdash.json
      warehouse_id: ${var.warehouse_id}
      embed_credentials: false

    clinical_dashboard:
      display_name: "Patient360 - Clinical Dashboard [${bundle.target}]"
      file_path: ./dashboards/patient360_clinical.lvdash.json
      warehouse_id: ${var.warehouse_id}
      embed_credentials: false

    operational_dashboard:
      display_name: "Patient360 - Operational Dashboard [${bundle.target}]"
      file_path: ./dashboards/patient360_operational.lvdash.json
      warehouse_id: ${var.warehouse_id}
      embed_credentials: false

    financial_dashboard:
      display_name: "Patient360 - Financial Dashboard [${bundle.target}]"
      file_path: ./dashboards/patient360_financial.lvdash.json
      warehouse_id: ${var.warehouse_id}
      embed_credentials: false
