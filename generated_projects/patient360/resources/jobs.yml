patient360_pipeline:
  name: "Patient360 Analytics Pipeline - ${bundle.target}"
  description: "End-to-end Patient 360 Medallion pipeline: Ingestion → Bronze → Silver → Gold"

  schedule:
    quartz_cron_expression: "0 0 2 * * ?"
    timezone_id: "Asia/Kolkata"
    pause_status: UNPAUSED

  email_notifications:
    on_failure:
      - ${var.notification_email}
    on_success:
      - ${var.notification_email}

  tasks:
    - task_key: ingest_source
      description: "Ingest CSV files from source to raw schema"
      notebook_task:
        notebook_path: ./src/ingestion/ingest_patient_records
        base_parameters:
          catalog: "${var.catalog_name}"
          source_schema: "${var.source_schema}"
          raw_schema: "${var.raw_schema}"
      existing_cluster_id: "${var.cluster_id}"
      timeout_seconds: 3600
      max_retries: 2

    - task_key: bronze_load
      description: "Load raw data into Bronze Delta tables"
      depends_on:
        - task_key: ingest_source
      notebook_task:
        notebook_path: ./src/bronze/bronze_load_all
        base_parameters:
          catalog: "${var.catalog_name}"
          raw_schema: "${var.raw_schema}"
      existing_cluster_id: "${var.cluster_id}"
      timeout_seconds: 3600
      max_retries: 1

    - task_key: silver_transform
      description: "Apply Silver transformations and DQ rules"
      depends_on:
        - task_key: bronze_load
      notebook_task:
        notebook_path: ./src/silver/silver_transform_all
        base_parameters:
          catalog: "${var.catalog_name}"
          silver_schema: "${var.silver_schema}"
      existing_cluster_id: "${var.cluster_id}"
      timeout_seconds: 7200
      max_retries: 1

    - task_key: gold_build
      description: "Build Gold analytical datasets and KPIs"
      depends_on:
        - task_key: silver_transform
      notebook_task:
        notebook_path: ./src/gold/gold_build_all
        base_parameters:
          catalog: "${var.catalog_name}"
          silver_schema: "${var.silver_schema}"
          gold_schema: "${var.gold_schema}"
      existing_cluster_id: "${var.cluster_id}"
      timeout_seconds: 7200
      max_retries: 1

    - task_key: dashboard_refresh
      description: "Refresh dashboard datasets"
      depends_on:
        - task_key: gold_build
      notebook_task:
        notebook_path: ./src/gold/refresh_dashboard_datasets
        base_parameters:
          catalog: "${var.catalog_name}"
          gold_schema: "${var.gold_schema}"
      existing_cluster_id: "${var.cluster_id}"
      timeout_seconds: 1800
      max_retries: 1
