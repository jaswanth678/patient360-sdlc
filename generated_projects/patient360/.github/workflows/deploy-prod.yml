name: Deploy to PROD

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to confirm production deployment"
        required: true

jobs:
  guard:
    name: Confirm PROD Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "Deployment not confirmed. Type DEPLOY to proceed."
            exit 1
          fi

  deploy-prod:
    name: Bundle Deploy - PROD
    runs-on: ubuntu-latest
    needs: guard
    environment: prod
    concurrency:
      group: deploy-prod
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: pip install databricks-cli databricks-sdk

      - name: Deploy Bundle to PROD
        run: databricks bundle deploy --target prod
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}

      - name: Verify PROD Deployment
        run: |
          databricks runs submit --json '{
            "run_name": "prod_validation",
            "existing_cluster_id": "${{ secrets.CLUSTER_ID_PROD }}",
            "notebook_task": {
              "notebook_path": "/Workspace/patient360/workspace/notebooks/validation/validate_pipeline",
              "base_parameters": {"catalog": "sdlc_catalog"}
            }
          }'
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}

      - name: Rollback on Failure
        if: failure()
        run: |
          echo "PROD deployment FAILED. Initiate rollback."
          echo "Run: databricks bundle deploy --target prod (previous commit)"
          exit 1
