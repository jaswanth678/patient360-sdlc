name: Deploy to PROD

on:
  workflow_dispatch:
    inputs:
      change_request_id:
        description: "Approved Change Request ID (e.g. CR-P360-001) — deployment blocked without this"
        required: true
        type: string
      confirm:
        description: "Type DEPLOY to confirm production deployment"
        required: true
        type: string

defaults:
  run:
    working-directory: generated_projects/patient360

jobs:
  guard:
    name: Production Deployment Gate
    runs-on: ubuntu-latest
    steps:
      - name: Verify Change Request provided
        run: |
          if [ -z "${{ github.event.inputs.change_request_id }}" ]; then
            echo "ERROR: Change Request ID is required for Production deployment."
            exit 1
          fi
          echo "Change Request: ${{ github.event.inputs.change_request_id }}"

      - name: Verify deployment confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "ERROR: Type DEPLOY in the confirm field to proceed with Production deployment."
            exit 1
          fi

  deploy-prod:
    name: Bundle Deploy - PROD
    runs-on: ubuntu-latest
    needs: guard
    environment: prod
    concurrency:
      group: deploy-prod
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Log Change Request
        run: echo "Deploying under approved Change Request ${{ github.event.inputs.change_request_id }}"

      - name: Validate Bundle
        run: databricks bundle validate
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}

      - name: Deploy Bundle to PROD
        run: databricks bundle deploy --target prod
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}

      - name: Capture Deployed Resource Summary
        run: databricks bundle summary --target prod
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}

      - name: Notify Success
        if: success()
        run: echo "PROD deployment successful — CR ${{ github.event.inputs.change_request_id }}"

      - name: Notify Failure
        if: failure()
        run: |
          echo "PROD deployment FAILED — CR ${{ github.event.inputs.change_request_id }}"
          echo "Initiate rollback per docs/Change_Request.md rollback steps"
          exit 1
