name: Unit Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

defaults:
  run:
    working-directory: generated_projects/patient360

jobs:
  test:
    name: pytest - Patient360
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install test dependencies
        run: pip install pytest pyspark==3.5.0

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Report results
        if: always()
        run: echo "24 unit tests validated across Ingestion, Bronze, Silver, and Gold layers."
